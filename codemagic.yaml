workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set up local.properties
        script: |
          cd EasyShare
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          cd EasyShare
          gradle assembleDebug
    artifacts:
      - EasyShare/app/build/outputs/apk/**/*.apk
